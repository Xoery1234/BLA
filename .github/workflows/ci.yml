name: mcp-ci

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'mcp/**'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # .nvmrc lives at repo root; setup-node reads relative to the repo root, not the job's working-directory.
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: mcp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
